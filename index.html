<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hand Gesture Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a2e;
      color: white;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #videoPreview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    
    #ui {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .gesture-box {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      padding: 15px 25px;
      border-radius: 50px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    
    .gesture-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #aaa;
      margin-bottom: 5px;
    }
    
    .gesture-value {
      font-size: 1.5rem;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    
    #effectBox {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      padding: 20px 40px;
      border-radius: 30px;
      font-size: 1.2rem;
      text-align: center;
      z-index: 10;
      transition: all 0.5s ease;
      border: 2px solid transparent;
    }
    
    .effect-active {
      animation: pulse 1s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
    }
    
    #particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: float 1s ease-out forwards;
    }
    
    @keyframes float {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0);
      }
    }
    
    #instructions {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 10px 25px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #ccc;
      text-align: center;
      z-index: 10;
      white-space: nowrap;
    }
    
    @media (max-width: 600px) {
      #instructions {
        white-space: normal;
        width: 90%;
        font-size: 0.7rem;
        bottom: 100px;
      }
      .gesture-box {
        padding: 10px 15px;
      }
      .gesture-value {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="videoPreview" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
    <div id="particles"></div>
    
    <div id="ui">
      <div class="gesture-box">
        <div class="gesture-label">Gesture</div>
        <div class="gesture-value" id="gestureName">Waiting...</div>
      </div>
    </div>
    
    <div id="effectBox">
      <span id="effectText">Show your hand 👋</span>
    </div>
    
    <div id="instructions">
      ☝️ One finger: Blue | ✌️ Two fingers: Green | 🖐️ Open hand: Gold | ✊ Fist: Red
    </div>
  </div>

  <!-- Load MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

  <script>
    const videoElement = document.getElementById('videoPreview');
    const canvasElement = document.getElementById('outputCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const gestureNameEl = document.getElementById('gestureName');
    const effectBox = document.getElementById('effectBox');
    const effectText = document.getElementById('effectText');
    const particlesContainer = document.getElementById('particles');

    let currentGesture = 'NONE';
    let lastGestureTime = 0;
    const gestureCooldown = 500; // ms between gesture changes

    // Set canvas size
    function resizeCanvas() {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Create particle burst effect
    function createParticles(x, y, color, count = 30) {
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.width = (Math.random() * 15 + 5) + 'px';
        particle.style.height = particle.style.width;
        particle.style.backgroundColor = color;
        particle.style.boxShadow = `0 0 ${Math.random() * 20 + 10}px ${color}`;
        
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 150 + 50;
        particle.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
        particle.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
        
        particlesContainer.appendChild(particle);
        
        // Remove particle after animation
        setTimeout(() => {
          particle.remove();
        }, 1000);
      }
    }

    // Update UI based on gesture
    function updateGestureUI(gesture) {
      const now = Date.now();
      
      // Only update if gesture changed and cooldown passed
      if (gesture === currentGesture && now - lastGestureTime < gestureCooldown) {
        return;
      }
      
      currentGesture = gesture;
      lastGestureTime = now;
      
      // Reset styles
      effectBox.style.borderColor = 'transparent';
      effectBox.style.boxShadow = 'none';
      effectBox.classList.remove('effect-active');
      
      switch(gesture) {
        case 'ONE_FINGER':
          gestureNameEl.textContent = '☝️ One Finger';
          gestureNameEl.style.color = '#4da6ff';
          effectText.textContent = '🔵 Blue Energy - Pointing detected!';
          effectBox.style.borderColor = '#4da6ff';
          effectBox.style.boxShadow = '0 0 30px rgba(77, 166, 255, 0.6)';
          effectBox.classList.add('effect-active');
          break;
          
        case 'TWO_FINGERS':
          gestureNameEl.textContent = '✌️ Two Fingers';
          gestureNameEl.style.color = '#4dff4d';
          effectText.textContent = '🟢 Green Power - Peace sign!';
          effectBox.style.borderColor = '#4dff4d';
          effectBox.style.boxShadow = '0 0 30px rgba(77, 255, 77, 0.6)';
          effectBox.classList.add('effect-active');
          break;
          
        case 'OPEN_HAND':
          gestureNameEl.textContent = '🖐️ Open Hand';
          gestureNameEl.style.color = '#ffd700';
          effectText.textContent = '🟡 Golden Glow - Palm detected!';
          effectBox.style.borderColor = '#ffd700';
          effectBox.style.boxShadow = '0 0 30px rgba(255, 215, 0, 0.6)';
          effectBox.classList.add('effect-active');
          break;
          
        case 'FIST':
          gestureNameEl.textContent = '✊ Fist';
          gestureNameEl.style.color = '#ff4444';
          effectText.textContent = '🔴 Red Alert - Fist detected!';
          effectBox.style.borderColor = '#ff4444';
          effectBox.style.boxShadow = '0 0 30px rgba(255, 68, 68, 0.6)';
          effectBox.classList.add('effect-active');
          break;
          
        default:
          gestureNameEl.textContent = '👋 No Gesture';
          gestureNameEl.style.color = '#ffffff';
          effectText.textContent = 'Show your hand to the camera';
          effectBox.style.borderColor = 'rgba(255,255,255,0.3)';
          effectBox.style.boxShadow = 'none';
          break;
      }
    }

    // Detect gesture from hand landmarks
    function detectGesture(landmarks) {
      if (!landmarks || landmarks.length === 0) {
        return 'NONE';
      }
      
      // Key landmarks
      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const middleTip = landmarks[12];
      const ringTip = landmarks[16];
      const pinkyTip = landmarks[20];
      
      const indexPip = landmarks[6];
      const middlePip = landmarks[10];
      const ringPip = landmarks[14];
      const pinkyPip = landmarks[18];
      
      const wrist = landmarks[0];
      
      // Count extended fingers (tip is higher than PIP joint - lower y value)
      let extendedCount = 0;
      
      // Index finger
      if (indexTip.y < indexPip.y - 0.03) extendedCount++;
      // Middle finger
      if (middleTip.y < middlePip.y - 0.03) extendedCount++;
      // Ring finger
      if (ringTip.y < ringPip.y - 0.03) extendedCount++;
      // Pinky
      if (pinkyTip.y < pinkyPip.y - 0.03) extendedCount++;
      // Thumb (different check - horizontal extension)
      if (Math.abs(thumbTip.x - wrist.x) > 0.2) extendedCount++;
      
      // Determine gesture
      if (extendedCount <= 1) {
        return 'FIST';
      } else if (extendedCount === 2) {
        // Check if it's specifically index + middle (peace sign)
        if (indexTip.y < indexPip.y - 0.03 && middleTip.y < middlePip.y - 0.03) {
          return 'TWO_FINGERS';
        }
        return 'NONE';
      } else if (extendedCount === 3) {
        return 'NONE';
      } else if (extendedCount >= 4) {
        return 'OPEN_HAND';
      }
      
      // Check for one finger pointing (index only)
      if (indexTip.y < indexPip.y - 0.03 && 
          middleTip.y > middlePip.y && 
          ringTip.y > ringPip.y && 
          pinkyTip.y > pinkyPip.y) {
        return 'ONE_FINGER';
      }
      
      return 'NONE';
    }

    // Process hand tracking results
    function onResults(results) {
      // Clear canvas
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      let detectedGesture = 'NONE';
      
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // Draw hand landmarks
        drawConnectors(canvasCtx, landmarks, HANDS_CONNECTIONS, {
          color: '#00FF00',
          lineWidth: 2
        });
        drawLandmarks(canvasCtx, landmarks, {
          color: '#FF0000',
          lineWidth: 1,
          radius: 3
        });
        
        // Detect gesture
        detectedGesture = detectGesture(landmarks);
        
        // Create particles at palm center (landmark 9)
        const palmCenter = landmarks[9];
        const x = (1 - palmCenter.x) * canvasElement.width; // Mirror
        const y = palmCenter.y * canvasElement.height;
        
        // Color based on gesture
        let particleColor = '#ffffff';
        switch(detectedGesture) {
          case 'ONE_FINGER': particleColor = '#4da6ff'; break;
          case 'TWO_FINGERS': particleColor = '#4dff4d'; break;
          case 'OPEN_HAND': particleColor = '#ffd700'; break;
          case 'FIST': particleColor = '#ff4444'; break;
        }
        
        if (detectedGesture !== 'NONE' && Math.random() > 0.7) {
          createParticles(x, y, particleColor, 5);
        }
      }
      
      canvasCtx.restore();
      
      // Update gesture display
      updateGestureUI(detectedGesture);
    }

    // Initialize MediaPipe Hands
    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    // Initialize camera
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });

    camera.start().then(() => {
      console.log('Camera started successfully!');
      effectText.textContent = 'Camera ready! Show your hand 👋';
    }).catch((error) => {
      console.error('Camera error:', error);
      effectText.textContent = '⚠️ Camera access denied! Please allow camera access.';
      gestureNameEl.textContent = 'Error';
      gestureNameEl.style.color = '#ff4444';
      
      // Try to show manual instructions
      alert('Please allow camera access to use this app. Look for the camera icon in your address bar and enable it, then refresh the page.');
    });

    // Handle window resize for canvas
    window.addEventListener('resize', () => {
      resizeCanvas();
    });
  </script>
</body>
</html>
