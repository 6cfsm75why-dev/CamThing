<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hand Gesture Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a2e;
      color: white;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: none;
    }
    
    #startScreen {
      text-align: center;
      z-index: 100;
    }
    
    #startButton {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 25px 60px;
      font-size: 1.5rem;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    
    #startButton:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6);
    }
    
    #startButton:active {
      transform: translateY(0);
    }
    
    .start-title {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .start-subtitle {
      color: #aaa;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    
    #videoPreview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    
    #ui {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .gesture-box {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 15px 30px;
      border-radius: 50px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }
    
    .gesture-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #aaa;
      margin-bottom: 5px;
    }
    
    .gesture-value {
      font-size: 1.8rem;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    
    #effectBox {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 40px;
      border-radius: 30px;
      font-size: 1.3rem;
      text-align: center;
      z-index: 10;
      transition: all 0.5s ease;
      border: 3px solid transparent;
    }
    
    .effect-active {
      animation: pulse 1s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.08); }
    }
    
    #particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: float 1s ease-out forwards;
    }
    
    @keyframes float {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0);
      }
    }
    
    #instructions {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 25px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #ccc;
      text-align: center;
      z-index: 10;
      white-space: nowrap;
    }
    
    #errorMessage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 0, 0, 0.9);
      padding: 20px 30px;
      border-radius: 15px;
      text-align: center;
      z-index: 20;
      display: none;
    }
    
    @media (max-width: 600px) {
      #instructions {
        white-space: normal;
        width: 90%;
        font-size: 0.7rem;
        bottom: 110px;
      }
      .gesture-box {
        padding: 10px 20px;
      }
      .gesture-value {
        font-size: 1.3rem;
      }
      #effectBox {
        padding: 15px 25px;
        font-size: 1rem;
      }
      .start-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Start Screen -->
  <div id="startScreen">
    <div class="start-title">✋ Hand Tracker</div>
    <div class="start-subtitle">Use gestures to create magic effects</div>
    <button id="startButton" onclick="startCamera()">
      🎥 Start Camera
    </button>
    <p style="color:#888; margin-top:20px; font-size:0.8rem;">
      Camera access required • Works best in good lighting
    </p>
  </div>

  <!-- Main App (hidden initially) -->
  <div id="container">
    <video id="videoPreview" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
    <div id="particles"></div>
    
    <div id="ui">
      <div class="gesture-box">
        <div class="gesture-label">Gesture Detected</div>
        <div class="gesture-value" id="gestureName">Waiting...</div>
      </div>
    </div>
    
    <div id="effectBox">
      <span id="effectText">Show your hand 👋</span>
    </div>
    
    <div id="instructions">
      ☝️ One finger: Blue | ✌️ Two fingers: Green | 🖐️ Open hand: Gold | ✊ Fist: Red
    </div>
    
    <div id="errorMessage">
      <span id="errorText"></span>
    </div>
  </div>

  <!-- Load MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

  <script>
    const videoElement = document.getElementById('videoPreview');
    const canvasElement = document.getElementById('outputCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const gestureNameEl = document.getElementById('gestureName');
    const effectBox = document.getElementById('effectBox');
    const effectText = document.getElementById('effectText');
    const particlesContainer = document.getElementById('particles');
    const startScreen = document.getElementById('startScreen');
    const container = document.getElementById('container');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');

    let currentGesture = 'NONE';
    let lastGestureTime = 0;
    const gestureCooldown = 500;
    let cameraStarted = false;

    // Resize canvas
    function resizeCanvas() {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // Create particles
    function createParticles(x, y, color, count = 30) {
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        const size = Math.random() * 15 + 5;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.backgroundColor = color;
        particle.style.boxShadow = `0 0 ${Math.random() * 20 + 10}px ${color}`;
        
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 150 + 50;
        particle.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
        particle.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
        
        particlesContainer.appendChild(particle);
        
        setTimeout(() => {
          if (particle.parentNode) {
            particle.remove();
          }
        }, 1000);
      }
    }

    // Update gesture UI
    function updateGestureUI(gesture) {
      const now = Date.now();
      
      if (gesture === currentGesture && now - lastGestureTime < gestureCooldown) {
        return;
      }
      
      currentGesture = gesture;
      lastGestureTime = now;
      
      effectBox.style.borderColor = 'transparent';
      effectBox.style.boxShadow = 'none';
      effectBox.classList.remove('effect-active');
      
      switch(gesture) {
        case 'ONE_FINGER':
          gestureNameEl.textContent = '☝️ One Finger';
          gestureNameEl.style.color = '#4da6ff';
          effectText.textContent = '🔵 Blue Energy';
          effectBox.style.borderColor = '#4da6ff';
          effectBox.style.boxShadow = '0 0 40px rgba(77, 166, 255, 0.7)';
          effectBox.classList.add('effect-active');
          break;
          
        case 'TWO_FINGERS':
          gestureNameEl.textContent = '✌️ Two Fingers';
          gestureNameEl.style.color = '#4dff4d';
          effectText.textContent = '🟢 Green Power';
          effectBox.style.borderColor = '#4dff4d';
          effectBox.style.boxShadow = '0 0 40px rgba(77, 255, 77, 0.7)';
          effectBox.classList.add('effect-active');
          break;
          
        case 'OPEN_HAND':
          gestureNameEl.textContent = '🖐️ Open Hand';
          gestureNameEl.style.color = '#ffd700';
          effectText.textContent = '🟡 Golden Glow';
          effectBox.style.borderColor = '#ffd700';
          effectBox.style.boxShadow = '0 0 40px rgba(255, 215, 0, 0.7)';
          effectBox.classList.add('effect-active');
          break;
          
        case 'FIST':
          gestureNameEl.textContent = '✊ Fist';
          gestureNameEl.style.color = '#ff4444';
          effectText.textContent = '🔴 Red Alert';
          effectBox.style.borderColor = '#ff4444';
          effectBox.style.boxShadow = '0 0 40px rgba(255, 68, 68, 0.7)';
          effectBox.classList.add('effect-active');
          break;
          
        default:
          gestureNameEl.textContent = 'No Gesture';
          gestureNameEl.style.color = '#ffffff';
          effectText.textContent = 'Show your hand to the camera';
          effectBox.style.borderColor = 'rgba(255,255,255,0.3)';
          effectBox.style.boxShadow = 'none';
          break;
      }
    }

    // Detect gesture
    function detectGesture(landmarks) {
      if (!landmarks || landmarks.length === 0) return 'NONE';
      
      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const middleTip = landmarks[12];
      const ringTip = landmarks[16];
      const pinkyTip = landmarks[20];
      
      const indexPip = landmarks[6];
      const middlePip = landmarks[10];
      const ringPip = landmarks[14];
      const pinkyPip = landmarks[18];
      
      const wrist = landmarks[0];
      
      let extendedCount = 0;
      
      if (indexTip.y < indexPip.y - 0.03) extendedCount++;
      if (middleTip.y < middlePip.y - 0.03) extendedCount++;
      if (ringTip.y < ringPip.y - 0.03) extendedCount++;
      if (pinkyTip.y < pinkyPip.y - 0.03) extendedCount++;
      if (Math.abs(thumbTip.x - wrist.x) > 0.2) extendedCount++;
      
      // Check for one finger specifically
      if (indexTip.y < indexPip.y - 0.03 && 
          middleTip.y > middlePip.y && 
          ringTip.y > ringPip.y && 
          pinkyTip.y > pinkyPip.y) {
        return 'ONE_FINGER';
      }
      
      if (extendedCount <= 1) return 'FIST';
      if (extendedCount === 2) return 'TWO_FINGERS';
      if (extendedCount >= 4) return 'OPEN_HAND';
      
      return 'NONE';
    }

    // Process results
    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      let detectedGesture = 'NONE';
      
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // Draw landmarks
        if (window.drawConnectors && window.HANDS_CONNECTIONS) {
          drawConnectors(canvasCtx, landmarks, HANDS_CONNECTIONS, {
            color: '#00FF00',
            lineWidth: 2
          });
        }
        if (window.drawLandmarks) {
          drawLandmarks(canvasCtx, landmarks, {
            color: '#FF0000',
            lineWidth: 1,
            radius: 3
          });
        }
        
        detectedGesture = detectGesture(landmarks);
        
        const palmCenter = landmarks[9];
        const x = (1 - palmCenter.x) * canvasElement.width;
        const y = palmCenter.y * canvasElement.height;
        
        let particleColor = '#ffffff';
        switch(detectedGesture) {
          case 'ONE_FINGER': particleColor = '#4da6ff'; break;
          case 'TWO_FINGERS': particleColor = '#4dff4d'; break;
          case 'OPEN_HAND': particleColor = '#ffd700'; break;
          case 'FIST': particleColor = '#ff4444'; break;
        }
        
        if (detectedGesture !== 'NONE' && Math.random() > 0.7) {
          createParticles(x, y, particleColor, 5);
        }
      }
      
      canvasCtx.restore();
      updateGestureUI(detectedGesture);
    }

    // Initialize hands
    let hands;
    
    function initHands() {
      hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`;
        }
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.5
      });

      hands.onResults(onResults);
    }

    // Start camera function - called by button click
    window.startCamera = async function() {
      try {
        // First, explicitly request camera permission
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { 
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: 'user'
          } 
        });
        
        // If we get here, permission was granted
        console.log('Camera permission granted!');
        
        // Show the app container
        startScreen.style.display = 'none';
        container.style.display = 'block';
        document.body.style.display = 'block';
        
        // Set up canvas
        resizeCanvas();
        
        // Initialize hands if not already
        if (!hands) {
          initHands();
        }
        
        // Set up video element with the stream
        videoElement.srcObject = stream;
        
        // Wait for video to be ready
        await new Promise((resolve) => {
          videoElement.onloadedmetadata = () => {
            videoElement.play();
            resolve();
          };
        });
        
        // Start the camera feed for MediaPipe
        const camera = new Camera(videoElement, {
          onFrame: async () => {
            await hands.send({ image: videoElement });
          },
          width: 640,
          height: 480
        });
        
        await camera.start();
        cameraStarted = true;
        console.log('Camera fully started!');
        
      } catch (error) {
        console.error('Camera error:', error);
        
        if (error.name === 'NotAllowedError') {
          alert('Camera access was denied. Please go to your browser settings, find this website, and enable camera access. Then refresh the page.');
        } else if (error.name === 'NotFoundError') {
          alert('No camera found. Please make sure your device has a camera and it\'s not being used by another app.');
        } else if (error.name === 'NotReadableError') {
          alert('Camera is already in use by another application. Please close other apps that might be using the camera.');
        } else {
          alert('Could not access camera: ' + error.message);
        }
      }
    };
  </script>
</body>
</html>
